[package]
name = "dvop"
version = "0.1.0"
edition = "2021"

[dependencies]
gtk4 = "0.9"
glib = "0.20"
gdk4 = "0.9"
vte4 = "0.8"
home = "0.5"
mime_guess = "2.0"
gdk-pixbuf = "0.20"
sourceview5 = "0.9"  # For syntax highlighting and completion
once_cell = "1.21"  # For thread-safe lazy initialization
regex = "1.12"  # For advanced text pattern matching in completion
serde = { version = "1.0", features = ["derive"] }  # For JSON serialization/deserialization
serde_json = "1.0"  # For JSON parsing
lazy_static = "1.4"  # For global static variables
tempfile = "3.23"  # For file operations and testing
chrono = "0.4"  # For proper date/time formatting
gstreamer = "0.23"  # For audio playback
gstreamer-app = "0.23"  # For audio data extraction
rustfft = "6.4"  # For FFT analysis
hound = "3.5"  # For reading audio files
apodize = "1.0"  # For windowing functions
pulldown-cmark = "0.13"  # For markdown parsing and rendering

[build-dependencies]
glib-build-tools = "0.20"